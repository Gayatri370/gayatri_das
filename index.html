<!DOCTYPE html>
<html>
<head>
<title>Gayatri Das Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
<head>
<style>
  
body{
font-family: 'poppins', sans-serif;
background: linear-gradient(-45deg, #008080, #004e92, #00c6ff, #00bfa6);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
color:white;
text-align:center;
margin:0;
}

  @keyframes gradientBG{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}
  
header{
padding:40px;
}

img{
width:150px;
border-radius:50%;
}

.projects{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:20px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
width:200px;
transition:transform 0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
padding:10px 20px;
background:#00adb5;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

section{
margin:40px;
}

input,textarea{
width:250px;
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

</style>
</head>

<body>

<header>

<img src="https://via.placeholder.com/150">

<h1 style="font-family:Poppins; color:#ffd700; font-size:50px;">
Gayatri <br> Das
</h1>
<p>IT Student | Developer</p>

<a href="resume.pdf">
<button>Download Resume</button>
</a>

</header>

<section>

<h2>Projects</h2>

<div class="projects">

<div class="card">
<h3>Women Safety App</h3>
<p>Voice activated safety system.</p>
</div>

<div class="card">
<h3>Portfolio Website</h3>
<p>Personal developer website.</p>
</div>

<div class="card">
<h3>Flutter Apps</h3>
<p>Learning mobile development.</p>
</div>

</div>

</section>

<section>

<h2>Contact Me</h2>

<form>
<input type="text" placeholder="Your Name"><br>
<input type="email" placeholder="Your Email"><br>
<textarea placeholder="Message"></textarea><br>
<button type="submit">Send</button>
</form>

</section>

</body>
</html>
